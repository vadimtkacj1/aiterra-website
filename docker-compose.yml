# Production: `edge` publishes :80 and :443; `web` is only reachable inside the compose network (no host :3000).
# One-time on the server: sudo systemctl stop nginx && sudo systemctl disable nginx
# (host nginx and container cannot both bind :80). Certs: /etc/letsencrypt mounted into `edge`.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    image: ${DOCKER_IMAGE:-aiterra-website:latest}
    container_name: aiterra-website-web
    restart: unless-stopped
    expose:
      - "80"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - PORT=80
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:80/'', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"',
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  edge:
    image: nginx:1.27-alpine
    container_name: aiterra-website-edge
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-cache:/var/cache/nginx
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  nginx-cache:
