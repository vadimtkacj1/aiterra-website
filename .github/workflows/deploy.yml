name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ccd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------
  # 1) CI: build/lint (optional tests)
  # ---------------------------
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

  # ---------------------------
  # 2) CD: deploy to server
  # ---------------------------
  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_KEY }}" | tr -d '[:space:]' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server host key
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/id_ed25519 -p "$PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
            set -euo pipefail

            mkdir -p ~/aiterra-website
            cd ~/aiterra-website

            if [ -d .git ]; then
              git fetch --all --prune
              git checkout main
              git pull --ff-only origin main
            else
              echo "Repo not initialized on server. Clone it manually once, then re-run."
              exit 1
            fi

            docker compose up -d --build --remove-orphans
            docker image prune -f

            echo "Deploy done"
            docker compose ps
          EOF